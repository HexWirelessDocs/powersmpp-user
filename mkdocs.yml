  - search
  - tags
  - encryptcontent:
      global_password: !ENV MKDOCS_PASSWORD
      title_prefix: ''
      summary: ''
      placeholder: 'Enter password'
      decryption_failure_message: 'Incorrect password. Please try again.'
      encryption_info_message: ''
      password_button: true
      password_button_text: 'Submit'
      input_class: 'md-input'
      button_class: 'md-button md-button--primary'
      remember_password: true
      session_storage: true

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://www.powersmpp.com
      name: Power SMPP Website
    - icon: fontawesome/brands/whatsapp
      link: https://wa.me/919909945175
      name: WhatsApp Support
  generator: false

copyright: Copyright &copy; 2024-2026 Power SMPP. All rights reserved.

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

INHERIT: ./nav.yml
