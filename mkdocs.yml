site_name: Power SMPP User Documentation
site_url: https://doc.user.powersmpp.com

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - search.highlight
    - search.suggest
    - search.share
    - navigation.tracking
    - navigation.footer
    - navigation.top
    - toc.follow
    - content.code.copy
  font:
    text: Roboto
    code: Red Hat Mono
  logo: assets/powersmpp.png
  favicon: assets/powersmppfavicon.png
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: white
      accent: deep orange
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: cyan
      accent: cyan
    # Light Mode

